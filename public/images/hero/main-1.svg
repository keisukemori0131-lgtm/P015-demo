      <stop offset="0" stop-color="#CFEFF8"/>
      <stop offset="1" stop-color="#EAF8FC"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#sky)"/>
  <circle cx="1280" cy="220" r="120" fill="#FFD86B" opacity="0.9"/>
  <g fill="#FFFFFF" opacity="0.9">
    <ellipse cx="360" cy="220" rx="150" ry="60"/>
    <ellipse cx="470" cy="200" rx="110" ry="52"/>
    <ellipse cx="980" cy="160" rx="120" ry="48"/>
    <ellipse cx="1080" cy="180" rx="90" ry="40"/>
