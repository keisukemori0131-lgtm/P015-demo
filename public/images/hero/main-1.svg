    <g transform="translate(560 560) rotate(-6)"><rect x="-60" y="-60" width="120" height="120" rx="18" fill="#7ED0E6"/><text x="0" y="28" fill="#FFFDF6">A</text></g>
    <g transform="translate(700 600) rotate(4)"><rect x="-60" y="-60" width="120" height="120" rx="18" fill="#FF9E86"/><text x="0" y="28" fill="#FFFDF6">B</text></g>
    <g transform="translate(840 560) rotate(-3)"><rect x="-60" y="-60" width="120" height="120" rx="18" fill="#FFD86B"/><text x="0" y="28" fill="#2F4A57">C</text></g>
  </g>
  <g fill="#FFFFFF" opacity="0.85"><circle cx="200" cy="430" r="7"/><circle cx="1380" cy="470" r="9"/><circle cx="1180" cy="380" r="6"/></g>
